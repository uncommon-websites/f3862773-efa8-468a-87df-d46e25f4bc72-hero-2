<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biztrack - Say hello to Memo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.97); }
            to { opacity: 1; transform: scale(1); }
        }

        .animate-fade-in-up {
            opacity: 0;
            animation: fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .animate-fade-in {
            opacity: 0;
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .animate-scale-in {
            opacity: 0;
            animation: scaleIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .delay-0 { animation-delay: 0ms; }
        .delay-100 { animation-delay: 100ms; }
        .delay-200 { animation-delay: 200ms; }
        .delay-300 { animation-delay: 300ms; }
        .delay-400 { animation-delay: 400ms; }

        .text-balance { text-wrap: balance; }
        
        /* Custom font smoothing for that Apple-like crispness */
        body {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
    </style>
</head>
<body class="bg-white text-[#111111] font-sans overflow-x-hidden selection:bg-gray-200">

    <!-- Navigation -->
    <header class="w-full flex justify-center pt-8 absolute top-0 z-50">
        <div class="animate-fade-in delay-0 flex items-center justify-between w-[320px] px-5 py-3 border border-gray-200 rounded-full bg-white/90 backdrop-blur-md shadow-[0_2px_8px_rgba(0,0,0,0.04)]">
            <!-- Logo Icon -->
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" class="text-black">
                <path d="M10 4a4 4 0 1 0-4 4h4V4Z"></path>
                <path d="M14 4a4 4 0 1 1 4 4h-4V4Z"></path>
                <path d="M14 20a4 4 0 1 0 4-4h-4v4Z"></path>
                <path d="M10 20a4 4 0 1 1-4-4h4v4Z"></path>
            </svg>
            
            <!-- Brand Name -->
            <span class="text-[12px] font-bold tracking-[0.2em] uppercase text-black">Biztrack</span>
            
            <!-- Menu Icon -->
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" class="text-black">
                <line x1="4" y1="10" x2="20" y2="10"></line>
                <line x1="4" y1="14" x2="20" y2="14"></line>
            </svg>
        </div>
    </header>

    <!-- Main Hero Section -->
    <main class="pt-40 pb-16 px-4 sm:px-6 lg:px-8 max-w-[1440px] mx-auto flex flex-col items-center">
        
        <!-- Pre-headline -->
        <div class="text-center mb-6 animate-fade-in-up delay-100">
            <p class="text-[14px] font-medium text-gray-900 leading-tight">The helpful home robot</p>
            <p class="text-[14px] text-gray-500 leading-tight mt-0.5">Beta launching late 2026</p>
        </div>

        <!-- Headline -->
        <h1 class="text-6xl sm:text-7xl md:text-[7rem] lg:text-[8rem] font-medium tracking-[-0.04em] leading-[1] text-center text-balance mb-10 max-w-6xl mx-auto animate-fade-in-up delay-200 text-[#111111]">
            Say hello to Memo
        </h1>

        <!-- Hero Image Container -->
        <div class="relative w-full max-w-[1300px] mx-auto animate-scale-in delay-300">
            <!-- Main Image -->
            <img 
                src="https://imolwncbqxugevwmleed.supabase.co/storage/v1/object/public/public-assets/hero-images/f3862773-efa8-468a-87df-d46e25f4bc72/hero-2-img-0-1772495350936.png" 
                alt="Memo robot in a home environment" 
                class="w-full h-auto object-cover rounded-3xl shadow-sm"
            />

            <!-- Floating CTA Button -->
            <div class="absolute bottom-8 left-1/2 -translate-x-1/2 z-10 animate-fade-in-up delay-400">
                <button class="group flex items-center gap-12 px-6 py-3.5 bg-[#FDE02E] hover:bg-[#F5D81A] transition-colors duration-200 rounded-full shadow-[0_4px_14px_rgba(0,0,0,0.05)] cursor-pointer transform active:scale-97">
                    <span class="text-[14px] font-medium text-black whitespace-nowrap">Join the Founding Family</span>
                    <div class="flex items-center gap-2.5">
                        <span class="text-[14px] text-black/70 whitespace-nowrap">Apply to the beta</span>
                        <span class="w-1.5 h-1.5 rounded-full bg-black"></span>
                    </div>
                </button>
            </div>
        </div>

    </main>

</body>
</html>
